name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_ROSA_PHONE: ${{ secrets.NEXT_PUBLIC_ROSA_PHONE }}
      NEXT_PUBLIC_ROSA_WHATSAPP: ${{ secrets.NEXT_PUBLIC_ROSA_WHATSAPP }}
      NEXT_PUBLIC_ROSA_INSTAGRAM: ${{ secrets.NEXT_PUBLIC_ROSA_INSTAGRAM }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_REVIEW_BUCKET: ${{ secrets.SUPABASE_REVIEW_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build Cloudflare worker
        run: npm run cf:build

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          secrets: |
            NEXT_PUBLIC_SITE_URL
            NEXT_PUBLIC_SUPABASE_URL
            NEXT_PUBLIC_SUPABASE_ANON_KEY
            NEXT_PUBLIC_ROSA_PHONE
            NEXT_PUBLIC_ROSA_WHATSAPP
            NEXT_PUBLIC_ROSA_INSTAGRAM
            SUPABASE_SERVICE_ROLE_KEY
            SUPABASE_REVIEW_BUCKET
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_ROSA_PHONE: ${{ secrets.NEXT_PUBLIC_ROSA_PHONE }}
          NEXT_PUBLIC_ROSA_WHATSAPP: ${{ secrets.NEXT_PUBLIC_ROSA_WHATSAPP }}
          NEXT_PUBLIC_ROSA_INSTAGRAM: ${{ secrets.NEXT_PUBLIC_ROSA_INSTAGRAM }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_REVIEW_BUCKET: ${{ secrets.SUPABASE_REVIEW_BUCKET }}
