name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      NEXT_PUBLIC_SITE_URL: https://medinaclean.com
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_ROSA_PHONE: ${{ secrets.NEXT_PUBLIC_ROSA_PHONE }}
      NEXT_PUBLIC_ROSA_WHATSAPP: ${{ secrets.NEXT_PUBLIC_ROSA_WHATSAPP }}
      NEXT_PUBLIC_ROSA_INSTAGRAM: ${{ secrets.NEXT_PUBLIC_ROSA_INSTAGRAM }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_REVIEW_BUCKET: review-headshots
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build Cloudflare worker
        run: npm run cf:build

      - name: Sync Worker secrets
        run: |
          set -euo pipefail
          for name in \
            NEXT_PUBLIC_SUPABASE_URL \
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY \
            NEXT_PUBLIC_ROSA_PHONE \
            NEXT_PUBLIC_ROSA_WHATSAPP \
            NEXT_PUBLIC_ROSA_INSTAGRAM \
            SUPABASE_SERVICE_ROLE_KEY
          do
            value="${!name:-}"
            if [ -n "$value" ]; then
              printf "%s" "$value" | npx wrangler secret put "$name"
            else
              echo "Skipping $name; no GitHub secret configured."
            fi
          done

      - name: Deploy
        run: npx wrangler deploy
