name: Deploy to Cloudflare

on:
  push:
    branches:
      - main

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      NEXT_PUBLIC_SITE_URL: https://medinaclean.com
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_ROSA_PHONE: ${{ secrets.NEXT_PUBLIC_ROSA_PHONE }}
      NEXT_PUBLIC_ROSA_PHONE_DISPLAY: ${{ secrets.NEXT_PUBLIC_ROSA_PHONE_DISPLAY }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: G-0S5533KG4X
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ROSA_ADMIN_PASSWORD: ${{ secrets.ROSA_ADMIN_PASSWORD }}
      ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
      META_ADS_LIVE_ENABLED: ${{ secrets.META_ADS_LIVE_ENABLED }}
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
      META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
      META_INSTAGRAM_ACTOR_ID: ${{ secrets.META_INSTAGRAM_ACTOR_ID }}
      META_API_VERSION: v24.0
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      SUPABASE_REVIEW_BUCKET: review-headshots
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      SITE_NOTIFY_TO: ${{ secrets.SITE_NOTIFY_TO }}
      CHAT_NOTIFY_TO: ${{ secrets.CHAT_NOTIFY_TO }}
      ASSESSMENT_HOST_EMAIL: ${{ secrets.ASSESSMENT_HOST_EMAIL }}
      SITE_NOTIFY_FROM: ${{ secrets.SITE_NOTIFY_FROM }}
      CHAT_NOTIFY_FROM: ${{ secrets.CHAT_NOTIFY_FROM }}
      TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
      AI_CHAT_ENABLED: "true"
      AI_CHAT_PROVIDER_CHAIN: gemini,openrouter
      AI_CHAT_MODE: free_api
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-2.5-flash
      GEMINI_BASE_URL: https://generativelanguage.googleapis.com/v1beta/openai/chat/completions
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: liquid/lfm-2.5-1.2b-instruct:free
      OPENROUTER_BASE_URL: https://openrouter.ai/api/v1/chat/completions
      AI_CHAT_APP_URL: https://medinaclean.com
      AI_CHAT_APP_TITLE: Medina Clean
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Playwright integration tests
        run: npm run test:e2e -- --project=chromium

      - name: Build Cloudflare worker
        run: npm run cf:build

      - name: Sync Worker secrets
        run: |
          set -euo pipefail
          for name in \
            NEXT_PUBLIC_SUPABASE_URL \
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY \
            NEXT_PUBLIC_ROSA_PHONE \
            NEXT_PUBLIC_ROSA_PHONE_DISPLAY \
            NEXT_PUBLIC_TURNSTILE_SITE_KEY \
            NEXT_PUBLIC_GA_MEASUREMENT_ID \
            SUPABASE_SERVICE_ROLE_KEY \
            ROSA_ADMIN_PASSWORD \
            ADMIN_SESSION_SECRET \
            META_ADS_LIVE_ENABLED \
            META_ACCESS_TOKEN \
            META_AD_ACCOUNT_ID \
            META_PAGE_ID \
            META_INSTAGRAM_ACTOR_ID \
            META_API_VERSION \
            YOUTUBE_CLIENT_ID \
            YOUTUBE_CLIENT_SECRET \
            YOUTUBE_REFRESH_TOKEN \
            RESEND_API_KEY \
            SITE_NOTIFY_TO \
            CHAT_NOTIFY_TO \
            ASSESSMENT_HOST_EMAIL \
            SITE_NOTIFY_FROM \
            CHAT_NOTIFY_FROM \
            TURNSTILE_SECRET_KEY \
            AI_CHAT_ENABLED \
            AI_CHAT_PROVIDER_CHAIN \
            AI_CHAT_MODE \
            GEMINI_API_KEY \
            GEMINI_MODEL \
            GEMINI_BASE_URL \
            OPENROUTER_API_KEY \
            OPENROUTER_MODEL \
            OPENROUTER_BASE_URL \
            AI_CHAT_APP_URL \
            AI_CHAT_APP_TITLE
          do
            value="${!name:-}"
            if [ -n "$value" ]; then
              printf "%s" "$value" | npx wrangler secret put "$name"
            else
              echo "Skipping $name; no GitHub secret configured."
            fi
          done

      - name: Deploy
        run: npx wrangler deploy
